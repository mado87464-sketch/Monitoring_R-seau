services:
  monitoring-app:
    build: .
    container_name: monitoring_app
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - DATABASE_PATH=/app/data/monitoring.db
    restart: unless-stopped
    networks:
      - monitoring-network

  monitoring-app-secure:
    build: .
    container_name: monitoring_app_secure
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - DATABASE_PATH=/app/data/monitoring.db
    restart: unless-stopped
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge

volumes:
  monitoring-data:
    driver: local
